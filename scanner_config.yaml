# Configuration file for Website Vulnerability Scanner
# Adjust scan parameters and options here

scan:
  max_depth: 2           # Default crawling depth
  concurrency: 10        # Number of concurrent requests
  exclude_urls: []       # List of URL patterns to exclude from scanning
  custom_payloads:       # Custom payloads for vulnerability checks
    sql_injection: "' OR '1'='1"
    xss: "<script>alert('XSS')</script>"
  respect_robots_txt: true
  user_agent: "WVS-Scanner/1.0"

report:
  export_formats: [txt, html, csv]
  show_dashboard: true

# Add more options as needed

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vulnerability Scanner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">Website Vulnerability Scanner</h1>
    <form method="post">
        <div class="mb-3">
            <label for="url" class="form-label">Website URL</label>
            <input type="url" class="form-control" id="url" name="url" placeholder="https://example.com" required value="{{ imported_url or '' }}">
        </div>
        <div class="mb-3">
            <label for="depth" class="form-label">Crawling Depth</label>
            <input type="number" class="form-control" id="depth" name="depth" value="{{ imported_depth or 2 }}" min="1" max="5">
        </div>
        <button type="submit" class="btn btn-primary">Start Scan</button>
    </form>
    {% if imported_url %}
    <div class="alert alert-success mt-4">
        <strong>Imported from CLI:</strong> URL <code>{{ imported_url }}</code> (depth {{ imported_depth }}).<br>
        Click <b>Start Scan</b> to scan this URL in the web interface.
    </div>
    {% endif %}
    <hr>
    <a href="{{ url_for('results') }}">View Previous Scans</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Previous Scans</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h1>Previous Scans</h1>
    <ul class="list-group">
        {% for scan_id, scan in scans.items() %}
            <li class="list-group-item">
                <a href="{{ url_for('scan_status', scan_id=scan_id) }}">
                    {{ scan.url }} (Depth: {{ scan.depth }}) - {{ scan.status|capitalize }}
                </a>
            </li>
        {% else %}
            <li class="list-group-item">No previous scans found.</li>
        {% endfor %}
    </ul>
    <a href="/" class="btn btn-secondary mt-3">Back to Home</a>
</div>
</body>
</html>

name: PR Security

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan-base:
    runs-on: ubuntu-latest
    steps:
      - name: Check out base snapshot
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          if [ -f ./backend/pyproject.toml ]; then
            python -m pip install -e ./backend
          fi
          python -m pip install semgrep pip-audit
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan base snapshot
        run: |
          mkdir -p artifacts
          if python -c "from app.sast.cli import main" 2>/dev/null; then
            python -m app.sast.cli scan-snapshot --repo . --output artifacts/base-findings.json
          else
            echo '{"repo_root":".","findings":[],"tool_errors":[{"tool":"skip","message":"SAST tools not available on base branch"}]}' > artifacts/base-findings.json
          fi

      - name: Upload base findings
        uses: actions/upload-artifact@v4
        with:
          name: base-findings
          path: artifacts/base-findings.json

  scan-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR merge snapshot
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          if [ -f ./backend/pyproject.toml ]; then
            python -m pip install -e ./backend
          fi
          python -m pip install semgrep pip-audit
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan PR merge snapshot
        run: |
          mkdir -p artifacts
          if python -c "from app.sast.cli import main" 2>/dev/null; then
            python -m app.sast.cli scan-snapshot --repo . --output artifacts/pr-findings.json
          else
            echo '{"repo_root":".","findings":[],"tool_errors":[{"tool":"skip","message":"SAST tools not available on PR branch"}]}' > artifacts/pr-findings.json
          fi

      - name: Upload PR findings
        uses: actions/upload-artifact@v4
        with:
          name: pr-findings
          path: artifacts/pr-findings.json

  compare-and-report:
    runs-on: ubuntu-latest
    needs: [scan-base, scan-pr]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend package
        run: |
          python -m pip install --upgrade pip
          if [ -f ./backend/pyproject.toml ]; then
            python -m pip install -e ./backend
          fi

      - name: Download base findings
        uses: actions/download-artifact@v4
        with:
          name: base-findings
          path: artifacts/base

      - name: Download PR findings
        uses: actions/download-artifact@v4
        with:
          name: pr-findings
          path: artifacts/pr

      - name: Compare findings
        id: compare
        continue-on-error: true
        run: |
          mkdir -p artifacts/report
          if python -c "from app.sast.cli import main" 2>/dev/null; then
            python -m app.sast.cli compare \
              --base artifacts/base/base-findings.json \
              --head artifacts/pr/pr-findings.json \
              --markdown artifacts/report/pr-security-summary.md \
              --json artifacts/report/diff-findings.json \
              --fail-threshold high \
              --github-annotations
          else
            echo "## PR Security Summary" > artifacts/report/pr-security-summary.md
            echo "" >> artifacts/report/pr-security-summary.md
            echo "SAST tools not available on this branch. No findings to compare." >> artifacts/report/pr-security-summary.md
            echo '{"new":[],"resolved":[],"unchanged":[],"blocking":[]}' > artifacts/report/diff-findings.json
          fi

      - name: Publish job summary
        if: always()
        run: cat artifacts/report/pr-security-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-security-report
          path: |
            artifacts/base/base-findings.json
            artifacts/pr/pr-findings.json
            artifacts/report/diff-findings.json
            artifacts/report/pr-security-summary.md

      - name: Comment on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("artifacts/report/pr-security-summary.md", "utf8");
            const diffJson = fs.readFileSync("artifacts/report/diff-findings.json", "utf8");
            const encoded = Buffer.from(diffJson).toString("base64");
            const marker = "<!-- venomai-pr-security -->";
            const dataTag = `<!-- venomai-findings:${encoded} -->`;
            const prUrl = context.payload.pull_request.html_url;
            const appLink = `http://localhost:4500?import_pr=${encodeURIComponent(prUrl)}`;
            const linkLine = `\n\n---\n[:mag: **Open in VenomAI Dashboard**](${appLink})\n`;
            const commentBody = `${marker}\n${dataTag}\n${body}${linkLine}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === "Bot" && comment.body && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
            }

      - name: Enforce blocking findings gate
        if: steps.compare.outcome == 'failure'
        run: exit 1
